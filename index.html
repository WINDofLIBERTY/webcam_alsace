<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webcams Alsace - Secteur Haguenau / Ohlungen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e0e0e0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 2px solid #2a6496;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #5bc0de;
    }

    header h1 span {
      color: #aaa;
      font-size: 0.9rem;
      font-weight: 400;
      margin-left: 10px;
    }

    #refresh-info {
      font-size: 0.82rem;
      color: #888;
    }

    #refresh-info b {
      color: #5bc0de;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 18px;
      padding: 24px;
    }

    .cam-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .cam-card:hover {
      border-color: #2a6496;
    }

    .cam-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2d3a;
    }

    .cam-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e0e0e0;
    }

    .cam-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: #1e3a4a;
      color: #5bc0de;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .cam-badge.live {
      background: #1a3a1a;
      color: #5cb85c;
    }

    .cam-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cam-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cam-img-wrap .loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #555;
      font-size: 0.85rem;
      pointer-events: none;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #2a2d3a;
      border-top-color: #2a6496;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .cam-footer {
      padding: 8px 14px;
      font-size: 0.75rem;
      color: #666;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cam-footer a {
      color: #2a6496;
      text-decoration: none;
    }

    .cam-footer a:hover { text-decoration: underline; }

    .cam-iframe-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      background: #0f1117;
    }

    .cam-iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .section-title {
      padding: 8px 24px 0;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
    }
  </style>
</head>
<body>

<header>
  <h1>Webcams Alsace <span>Secteur Haguenau / Ohlungen (67)</span></h1>
  <div id="refresh-info">Rafraîchissement dans <b id="countdown">30</b>s</div>
</header>

<p class="section-title">Aérodrome &amp; Trafic</p>
<div class="grid" id="grid-trafic">

  <div class="cam-card">
    <div class="cam-header">
      <span class="cam-title">Aérodrome de Haguenau</span>
      <span class="cam-badge live">Live</span>
    </div>
    <div class="cam-iframe-wrap">
      <iframe src="https://www.haguenau.meteoamikuze.com/Live.html" title="Aérodrome Haguenau live"></iframe>
    </div>
    <div class="cam-footer">
      <span>Haguenau (~8km)</span>
      <a href="https://www.haguenau.meteoamikuze.com/Live.html" target="_blank">Ouvrir</a>
    </div>
  </div>

</div>

<p class="section-title">Cols vosgiens — Bas-Rhin (67)</p>
<div class="grid" id="grid-cols">
</div>

<script>
  const cameras = [
    { name: "Col du Donon",        url: "https://inforoute.alsace.eu/webcam67/DONON/lastimage.jpeg",        loc: "D392 — Donon" },
    { name: "Champ du Feu",        url: "https://inforoute.alsace.eu/webcam67/CHAMP-DU-FEU/lastimage.jpeg", loc: "D425 — Champ du Feu" },
    { name: "Col de Hantz",        url: "https://inforoute.alsace.eu/webcam67/HANTZ/lastimage.jpeg",        loc: "D459 — Hantz" },
    { name: "Saales",              url: "https://inforoute.alsace.eu/webcam67/SAALES/lastimage.jpeg",       loc: "D1420 — Saales" },
    { name: "Steige",              url: "https://inforoute.alsace.eu/webcam67/STEIGE/lastimage.jpeg",       loc: "D167 — Steige" },
    { name: "Urbeis",              url: "https://inforoute.alsace.eu/webcam67/URBEIS/lastimage.jpeg",       loc: "D214 — Urbeis" },
    { name: "La Charbonnière",     url: "https://inforoute.alsace.eu/webcam67/CHARBONNIERE/lastimage.jpeg", loc: "D420 — Charbonnière" },
    { name: "Fouchy",              url: "https://inforoute.alsace.eu/webcam67/FOUCHY/lastimage.jpeg",       loc: "D48 — Fouchy" },
  ];

  const grid = document.getElementById('grid-cols');

  cameras.forEach((cam, i) => {
    const card = document.createElement('div');
    card.className = 'cam-card';
    card.innerHTML = `
      <div class="cam-header">
        <span class="cam-title">${cam.name}</span>
        <span class="cam-badge">Photo</span>
      </div>
      <div class="cam-img-wrap">
        <div class="loading"><div class="spinner"></div>Chargement...</div>
        <img id="img-${i}" alt="${cam.name}" style="display:none">
      </div>
      <div class="cam-footer">
        <span>${cam.loc}</span>
        <a href="${cam.url}" target="_blank">Image directe</a>
      </div>
    `;
    grid.appendChild(card);
  });

  function refreshImages() {
    const ts = Date.now();
    cameras.forEach((cam, i) => {
      const img = document.getElementById(`img-${i}`);
      const loading = img.previousElementSibling;
      const newImg = new Image();
      newImg.onload = () => {
        img.src = newImg.src;
        img.style.display = 'block';
        if (loading) loading.style.display = 'none';
      };
      newImg.onerror = () => {
        if (loading) loading.innerHTML = '<span style="color:#c0392b">Image indisponible</span>';
      };
      newImg.src = `${cam.url}?t=${ts}`;
    });
  }

  refreshImages();

  let remaining = 30;
  const countdown = document.getElementById('countdown');

  setInterval(() => {
    remaining--;
    countdown.textContent = remaining;
    if (remaining <= 0) {
      remaining = 30;
      refreshImages();
    }
  }, 1000);
</script>

</body>
</html>
