<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webcams — Secteur Ohlungen / Haguenau (67)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e0e0e0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 2px solid #2a6496;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #5bc0de;
    }

    header h1 span {
      color: #888;
      font-size: 0.85rem;
      font-weight: 400;
      margin-left: 8px;
    }

    #refresh-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
      color: #888;
    }

    #progress {
      width: 100px;
      height: 4px;
      background: #2a2d3a;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: #2a6496;
      width: 100%;
      transition: width 1s linear;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
      padding: 24px;
    }

    .cam-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .cam-card:hover {
      border-color: #2a6496;
      box-shadow: 0 4px 20px rgba(42,100,150,0.15);
    }

    .cam-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .cam-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .cam-meta {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .badge {
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .badge-live  { background: #1a3a1a; color: #5cb85c; }
    .badge-photo { background: #1e3a4a; color: #5bc0de; }
    .badge-dist  { background: #2a2d3a; color: #aaa; }

    .cam-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #0d0f17;
      overflow: hidden;
    }

    .cam-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cam-img-wrap .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 0.82rem;
      background: #0d0f17;
      transition: opacity 0.3s;
    }

    .cam-img-wrap .overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 26px; height: 26px;
      border: 3px solid #2a2d3a;
      border-top-color: #2a6496;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .cam-img-wrap iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    .cam-footer {
      padding: 8px 14px;
      font-size: 0.75rem;
      color: #555;
      display: flex;
      justify-content: space-between;
    }

    .cam-footer a { color: #2a6496; text-decoration: none; }
    .cam-footer a:hover { text-decoration: underline; }

    .section-label {
      padding: 20px 24px 0;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #444;
      border-top: 1px solid #1e2130;
    }

    .section-label:first-of-type { border-top: none; padding-top: 0; }

    .no-cam {
      grid-column: 1/-1;
      padding: 30px;
      text-align: center;
      color: #444;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Webcams <span>Secteur Ohlungen / Haguenau — Bas-Rhin (67)</span></h1>
  <div id="refresh-bar">
    <div id="progress"><div id="progress-fill"></div></div>
    <span>Rafraîchissement dans <b id="countdown">30</b>s</span>
  </div>
</header>

<!-- Aérodrome Haguenau : flux live -->
<p class="section-label">Aérodrome — ~8 km</p>
<div class="grid">
  <div class="cam-card">
    <div class="cam-header">
      <span class="cam-title">Aérodrome de Haguenau</span>
      <div class="cam-meta">
        <span class="badge badge-live">Live HD</span>
        <span class="badge badge-dist">~8 km</span>
      </div>
    </div>
    <div class="cam-img-wrap" style="aspect-ratio:4/3">
      <iframe src="https://www.haguenau.meteoamikuze.com/Live.html" title="Aérodrome Haguenau"></iframe>
    </div>
    <div class="cam-footer">
      <span>Haguenau LFSH</span>
      <a href="https://www.haguenau.meteoamikuze.com/Live.html" target="_blank">Ouvrir ↗</a>
    </div>
  </div>
</div>

<!-- Caméras trafic proches -->
<p class="section-label">Trafic routier — axes principaux</p>
<div class="grid" id="grid-trafic"></div>

<script>
  const cameras = [
    {
      name: "A35 — Roppenheim",
      url:  "https://inforoute.alsace.eu/webcamDIR/ROPPENHEIMA35/lastimage.jpeg",
      loc:  "A35 / D4 — frontière allemande",
      dist: "~15 km NE",
      src:  "inforoute.alsace.eu"
    },
    {
      name: "A35 — Hoerdt (jonction A4)",
      url:  "https://inforoute.alsace.eu/webcamDIR/HOERDT/lastimage.jpeg",
      loc:  "A35/A4 — Lauterbourg → Strasbourg",
      dist: "~20 km SE",
      src:  "inforoute.alsace.eu"
    },
    {
      name: "Col de Saverne — D1004",
      url:  "https://inforoute.alsace.eu/webcam67/SAVERNE-COL/lastimage.jpeg",
      loc:  "D1004 — direction Saverne",
      dist: "~15 km SO",
      src:  "inforoute.alsace.eu"
    },
  ];

  const grid = document.getElementById('grid-trafic');

  cameras.forEach((cam, i) => {
    grid.innerHTML += `
      <div class="cam-card">
        <div class="cam-header">
          <span class="cam-title">${cam.name}</span>
          <div class="cam-meta">
            <span class="badge badge-photo">Photo</span>
            <span class="badge badge-dist">${cam.dist}</span>
          </div>
        </div>
        <div class="cam-img-wrap">
          <div class="overlay" id="ov-${i}"><div class="spinner"></div><span>Chargement…</span></div>
          <img id="img-${i}" alt="${cam.name}">
        </div>
        <div class="cam-footer">
          <span>${cam.loc}</span>
          <a href="${cam.url}" target="_blank">Image directe ↗</a>
        </div>
      </div>`;
  });

  function loadImage(i) {
    const img = document.getElementById(`img-${i}`);
    const ov  = document.getElementById(`ov-${i}`);
    const tmp = new Image();
    tmp.onload = () => {
      img.src = tmp.src;
      ov.classList.add('hidden');
    };
    tmp.onerror = () => {
      ov.innerHTML = '<span style="color:#c0392b">Image indisponible</span>';
    };
    tmp.src = `${cameras[i].url}?t=${Date.now()}`;
  }

  function refreshAll() {
    cameras.forEach((_, i) => loadImage(i));
  }

  refreshAll();

  // Compte à rebours + barre de progression
  let remaining = 30;
  const countdown    = document.getElementById('countdown');
  const progressFill = document.getElementById('progress-fill');

  progressFill.style.width = '100%';

  setInterval(() => {
    remaining--;
    countdown.textContent = remaining;
    progressFill.style.width = `${(remaining / 30) * 100}%`;
    if (remaining <= 0) {
      remaining = 30;
      progressFill.style.transition = 'none';
      progressFill.style.width = '100%';
      setTimeout(() => { progressFill.style.transition = 'width 1s linear'; }, 50);
      refreshAll();
    }
  }, 1000);
</script>

</body>
</html>
